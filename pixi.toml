# Pixi manifest for the LeRobot teleoperation lecture.
# Docs: https://pixi.sh  |  LeRobot: https://github.com/huggingface/lerobot
[workspace]
name = "lecture_lerobot_teleop"
version = "0.1.0"
description = "LeRobot teleoperation lecture environment, managed reproducibly with pixi"
channels = ["conda-forge"]
# Add your platform here if it is missing (e.g. "osx-64", "win-64"), then run `pixi install`.
platforms = ["osx-arm64", "linux-64"]

# LeRobot pulls in rerun-sdk, which only ships manylinux_2_31 wheels. Raise the
# Linux glibc baseline to 2.31 (Ubuntu 20.04+/Debian 11+) so those wheels are
# accepted; otherwise the linux-64 solve silently falls back to a broken
# placeholder release of lerobot.
[system-requirements]
libc = "2.31"

# On hosts with an old system libstdc++ (e.g. Ubuntu 20.04), pip-installed torch
# loads the system libstdc++ first, which lacks the GLIBCXX symbols needed by the
# env's ffmpeg stack — torchcodec then fails to load. The env ships its own newer
# libstdc++ (conda-forge libstdcxx); preloading it fixes the load order. Newer
# libstdc++ is backward-compatible, so this is safe for every other tool too.
# (Harmless "cannot be preloaded" warning if run before `pixi install`.)
[target.linux-64.activation.env]
LD_PRELOAD = "$CONDA_PREFIX/lib/libstdc++.so.6"

# --- conda-forge packages -------------------------------------------------
# Python and the native ffmpeg build (used by LeRobot for video encode/decode)
# come from conda-forge so the binary codecs are present and reproducible.
[dependencies]
# lerobot 0.3.3 supports Python >=3.10; use 3.10 to match the upstream
# installation guidance for this older dataset-compatible release.
python = "3.10.*"
# Pin to ffmpeg 7.x: LeRobot decodes video via torchcodec, which only supports
# ffmpeg 4-7. conda-forge's ffmpeg 8 (libavutil.60) fails to load in torchcodec.
ffmpeg = ">=7.0,<8"
packaging = ">=24.2"
setuptools = "*"
pip = "*"
typer = "*"

# --- PyPI packages --------------------------------------------------------
# LeRobot ships on PyPI. The `feetech` extra pulls in feetech-servo-sdk, needed
# to drive Feetech servos (SO-100 / SO-101 teleop arms). The `pi0` extra pulls
# in the Transformers dependencies required by pi0 / PaliGemma policies.
[pypi-dependencies]
# Pinned to 0.3.3 for compatibility with datasets produced by that release.
lerobot = { version = "==0.3.3", extras = ["feetech", "pi0"] }

# --- Tasks (run with `pixi run <name>`) -----------------------------------
[tasks]
verify = { cmd = "python -c \"import lerobot, scservo_sdk; print('lerobot', lerobot.__version__, '| feetech OK')\"" }
ffmpeg-version = "ffmpeg -version"
find-cameras = "lerobot-find-cameras"  # list connected cameras and save a sample image
camera-map = "python scripts/camera_mapping.py"  # compare training camera views with current camera snapshots

# --- SO-101 arm workflow (register once by role, then no ports/ids needed) ---
set-port = "python scripts/so101.py find-port"       # usage: pixi run set-port leader | follower
arms = "python scripts/so101.py show"                # show registered arms
check = "python scripts/so101.py check"              # usage: pixi run check leader | follower
set-camera = "python scripts/so101.py set-camera"    # usage: pixi run set-camera front --index 0
setup-motors = "python scripts/so101.py setup-motors"  # usage: pixi run setup-motors leader | follower
calibrate = "python scripts/so101.py calibrate"      # usage: pixi run calibrate leader | follower
teleop = "python scripts/so101.py teleop"            # uses both saved arms; no args needed

# --- Imitation-learning pipeline (record -> train -> eval) -------------------
hf-login = "hf auth login"                           # log in before pushing datasets/policies
record = "python scripts/so101.py record"            # usage: pixi run record --task "..." --repo-id name
replay = "python scripts/so101.py replay"            # usage: pixi run replay --repo-id name --episode 0
viz = "python scripts/so101.py viz"                  # usage: pixi run viz --repo-id name --episode 0
drop = "python scripts/so101.py drop"                # usage: pixi run drop --repo-id name --episodes 0,2
upload = "python scripts/so101.py upload"            # usage: pixi run upload --repo-id name  (existing local dataset)
train = "python scripts/so101.py train"              # usage: pixi run train --repo-id name [--policy act]
eval = "python scripts/so101.py eval"                # usage: pixi run eval --policy <ckpt> --task "..." --repo-id eval_name
policy-test = "python scripts/so101.py policy-test"  # offline inference smoke test (no robot needed)

# Low-level fallback if you prefer raw lerobot port detection:
find-port = "lerobot-find-port"
